spring:
  datasource:
    url: jdbc:h2:mem:sentinelstack;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

sentinel:
  instance-name: test
  checks:
    enabled: false
    timeout-ms: 2000
